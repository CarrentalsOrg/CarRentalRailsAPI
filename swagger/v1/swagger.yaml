openapi: 3.1.0
info:
  title: Carrentals API
  description: Optional multiline or single-line description in [CommonMark](http://commonmark.org/help/) or HTML.
  version: 0.1.9

servers:
  - url: http://localhost:3025/v1
    description: Optional server description, e.g. Main (production) server
  

paths:
  /login:
    post:
      summary: Login existing user
      description: Optional extended description in CommonMark or HTML.
      requestBody:
        description: A JSON array of user names
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestLogin"
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseLogin"
  /signup:
    post:
      summary: Sign up user
      requestBody:
        description: A JSON array of user names
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestSignUp"
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSignUp"

  /rentals/{id}:
    get:
      summary: Get rental by id
      parameter:
        - in: path
          name: id
          schema:
            type: integer
            required: true
            description: Numeric ID of the rental to get
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseRental"
  
    patch:
      summary: Update rental by Id
      parameter:
        - in: path
          name: id
          schema:
            type: integer
            required: true
            description: Numeric ID of the rental to get
      requestBody:
        description: A JSON array of user names
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestRental"
        
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseRental"

  /rentals:
    post:
      requestBody:
        description: A JSON array of user names
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestRental"
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseRental"
  
  /vehicles:
    post:
      requestBody:
        description: A JSON array of user names
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVehicle"
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseRental"
  



components:
  schemas:
    RequestLogin:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
            password:
              type: string
          required: [email, password]
      required: [user]
    
    ResponseLogin:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            id:
              type: integer
              description: Id of th logged in user
            email:
              type: string
              description: email of the logged in user
    
    RequestSignUp:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
            password:
              type: string
            password_confirmation:
              type: string
          required: [email, password, password_confirmation]
      required: [user]

    ResponseSignUp:
      type: object
      properties:
        status:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        data:
          type: object
          properties:
            id:
              type: integer
              description: Id of the registered in user
            email:
              type: string
              description: email of the email of the registered in user
      required: [user]

    ResponseRental:
      type: object
      properties:
        id:
          type: integer
        vehicle_id:
          type: integer
          description: id of the associated vehicle
        user_id:
          type: integer
          description: id of the associated user
        rental_state:
          type: string
        total_rental_cost:
          type: number
        blocked_date:
          type: object
          properties:
            id:
              type: integer
            start_date:
              type: string
            finish_date:
              type: string

    RequestRental:
      type: object
      properties:
        rental:
          type: object
          properties:
            vehicle_id:
              type: integer
            blocked_date_attributes:
              $ref: "#/components/schemas/blocked_date_attributes"
    
    RequestVehicle:
      type: object
      properties:
        vehicle:
          type: object
          properties:
            brand:
              type: string
            model:
              type: string
            category:
              type: string
              enum: [ small, medium, big, suv, truck]
            transmission:
              type: string
              enum: [manual, auto]
            vehicle_type:
              type: string
              enum: [car, motorcycle, ev, evcycle]
            cost:
              type: number
            capacity:
              type: string
              enum: [1-4, 5-6, 7 plus]
        

    
    blocked_date_attributes:
      type: object
      properties:
        blocked_date_attributes:
              type: object
              properties:
                start_date:
                  type: string
                finish_date:
                  type: string

      
    


